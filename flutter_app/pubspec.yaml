name: braintrain_flutter
description: 나의 뇌 건강 — Flutter 뼈대 (Drift + Riverpod 마음 기록·분석)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  permission_handler: ^12.0.1
  noise_meter: ^5.1.0
  http: ^1.2.2
  speech_to_text: ^7.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

# Windows: upstream speech_to_text_windows sends invalid JSON (missing alternates).
dependency_overrides:
  speech_to_text_windows:
    path: packages/speech_to_text_windows

flutter:
  generate: true
  uses-material-design: true
