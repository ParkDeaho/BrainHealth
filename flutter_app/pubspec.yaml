name: braintrain_flutter
description: 나의 뇌 건강 — Flutter 뼈대 (Drift + Riverpod 마음 기록·분석)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  permission_handler: ^12.0.1
  noise_meter: ^5.1.0
  http: ^1.2.2
  speech_to_text: ^7.0.0
  url_launcher: ^6.3.1
  firebase_core: ^4.7.0
  firebase_analytics: ^12.3.0
  google_mobile_ads: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.4

# Windows: upstream speech_to_text_windows sends invalid JSON (missing alternates).
dependency_overrides:
  speech_to_text_windows:
    path: packages/speech_to_text_windows

flutter:
  generate: true
  uses-material-design: true

# dart run flutter_launcher_icons — 마스터: assets/icons/app_icon.png
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: assets/icons/app_icon.png
  remove_alpha_ios: true
  windows:
    generate: true
    image_path: assets/icons/app_icon.png
